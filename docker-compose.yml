services:
  mongo:
    image: mongo:7
    container_name: blinkshield-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blinkshield
    volumes:
      - mongo_data:/data/db

  ai-engine:
    build:
      context: ./ai-engine
    container_name: blinkshield-ai-engine
    environment:
      APP_ENV: development
      MOCK_MODE: "true"
      ENABLE_LANGCHAIN: "true"
      FRAUD_MODEL_PATH: /app/models/fraud_isolation_forest.joblib
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend
    container_name: blinkshield-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      APP_NAME: BlinkShield AI
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: blinkshield-super-secret
      MONGODB_URI: mongodb://mongo:27017/blinkshield
      AI_ENGINE_URL: http://ai-engine:8000
      MOCK_MODE: "true"
      AUTO_SEED: "true"
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - ai-engine

  frontend:
    build:
      context: ./frontend
    container_name: blinkshield-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
      VITE_APP_NAME: BlinkShield AI
      VITE_DEMO_MODE: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
